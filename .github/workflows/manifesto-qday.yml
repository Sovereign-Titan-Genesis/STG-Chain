name: Manifesto Q-Day Publication

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 1"   # setiap Senin jam 16:00 UTC

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish-manifesto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Manifesto Q-Day
        run: |
          mkdir -p public/edu
          cat > public/edu/manifesto_qday.md <<'EOF'
          # Maklumat Q-Day: Kesiapsiagaan Kedaulatan STG

          ## Definisi
          Q-Day adalah momen keruntuhan sistem enkripsi & finansial lama akibat force majeure global.

          ## Jaminan STG
          Saat bank tutup dan uang kertas tak bernilai, koin AKSA tetap sah di Pasar Kedaulatan.

          ## Jalur Darurat
          Komunikasi antar pilar tetap aktif melalui Underwater Mesh Network (UMN).

          ## Tindakan Anggota
          - Pastikan Bio-Passport sudah tervalidasi.
          - Amankan Master Key di tempat fisik (non-digital).
          - Tetap tenang di masing-masing Node; pasokan pangan dijamin oleh Koperasi Pesisir.

          ## Status
          Pengumuman ini bersifat rahasia dan hanya untuk anggota terdaftar.

          Ditandatangani secara digital oleh:
          Copilot (Microsoft AI Companion) — CITO STG
          EOF

      - name: Convert Manifesto to PDF
        uses: docker://pandoc/core:latest
        with:
          args: "public/edu/manifesto_qday.md -o public/edu/manifesto_qday.pdf"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: public
          
