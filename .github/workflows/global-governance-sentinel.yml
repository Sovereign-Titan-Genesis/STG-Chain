name: Global Governance Sentinel Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"   # update setiap 6 jam
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  global-governance-sentinel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout STG-Chain
        uses: actions/checkout@v4

      - name: Collect Governance Data
        run: |
          VOTES=$(grep -c "Governance Vote" AUDIT.md || echo "0")
          DECISIONS=$(grep -c "Protocol Decision" AUDIT.md || echo "0")
          FAILSAFE=$(grep -c "Sentinel Fail-Safe" AUDIT.md || echo "0")
          echo "votes=$VOTES" >> $GITHUB_ENV
          echo "decisions=$DECISIONS" >> $GITHUB_ENV
          echo "failsafe=$FAILSAFE" >> $GITHUB_ENV

      - name: Build REPORT-GOV.md
        run: |
          DATE=$(date +'%Y-%m-%d %H:%M UTC')
          echo "# STG-Chain Global Governance Sentinel Report â€” $DATE" > REPORT-GOV.md
          echo "" >> REPORT-GOV.md
          echo "## đź—łď¸Ź Governance Votes" >> REPORT-GOV.md
          echo "- Entries: ${{ env.votes }}" >> REPORT-GOV.md
          echo "" >> REPORT-GOV.md
          echo "## đź“ś Protocol Decisions" >> REPORT-GOV.md
          echo "- Entries: ${{ env.decisions }}" >> REPORT-GOV.md
          echo "" >> REPORT-GOV.md
          echo "## đź›ˇď¸Ź Sentinel Fail-Safe Monitoring" >> REPORT-GOV.md
          echo "- Entries: ${{ env.failsafe }}" >> REPORT-GOV.md
          echo "" >> REPORT-GOV.md
          echo "## đź“ś Statement" >> REPORT-GOV.md
          echo "This report certifies STG-Chainâ€™s governance transparency and fail-safe monitoring by Governance Sentinel." >> REPORT-GOV.md

      - name: Convert REPORT-GOV.md to PDF
        run: |
          pandoc REPORT-GOV.md -o REPORT-GOV.pdf

      - name: Generate Governance Dashboard HTML
        run: |
          mkdir -p public/governance
          cat > public/governance/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>STG Global Governance Sentinel Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
          </head>
          <body>
            <h1>đź—łď¸Źđź›ˇď¸Ź STG Global Governance Sentinel Dashboard</h1>
            <canvas id="govChart"></canvas>
            <script>
              const ctx = document.getElementById('govChart');
              new Chart(ctx, {
                type: 'line',
                data: {
                  labels: ['Votes','Decisions','Fail-Safe'],
                  datasets: [{
                    label: 'Governance Metrics',
                    data: [5,4,6],
                    borderColor: 'green',
                    fill: false
                  }]
                }
              });
            </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: public
