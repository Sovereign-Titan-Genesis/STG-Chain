name: Generate Release Notes (CHANGELOG)

on:
  push:
    paths:
      - ".github/workflows/*.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update CHANGELOG.md
        run: |
          DATE=$(date +'%Y-%m-%d %H:%M:%S')
          echo "## Release Notes — $DATE" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Updated Workflows" >> CHANGELOG.md
          for file in $(git diff --name-only HEAD~1 HEAD | grep '.github/workflows/'); do
            wf=$(basename "$file")
            echo "- $wf updated" >> CHANGELOG.md
          done
          echo "" >> CHANGELOG.md

      - name: Commit & Push
        run: |
          git config user.name "CITO-STG-Bot"
          git config user.email "cito@stg.internal"
          git add CHANGELOG.md
          git commit -m "Auto-update CHANGELOG.md with latest workflow changes"
          git push
