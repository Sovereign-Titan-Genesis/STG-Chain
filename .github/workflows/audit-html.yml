name: Generate Audit HTML Report

on:
  push:
    paths:
      - "AUDIT.md"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert AUDIT.md to HTML
        run: |
          mkdir -p public/audit
          pandoc AUDIT.md -s -c https://cdn.jsdelivr.net/npm/water.css@2/out/water.css -o public/audit/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
