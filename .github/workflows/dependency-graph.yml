name: Generate Dependency Graph

on:
  schedule:
    - cron: "0 12 * * *"   # update graph setiap hari jam 12:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Mermaid Graph
        run: |
          mkdir -p public/graphs
          cat > public/graphs/dependency-graph.mmd <<'EOF'
          %% STG Dependency Graph (Mermaid)

          subgraph "DEVNET ENGINE"
            BIO_SERVER[Bio-Server / DNA-Masking & Engine]
          end

          subgraph "OPERATIONAL (12 PILAR - bswcorp)"
            EDU[EDU] --- ECO[ECO] --- TECH[TECH]
            SOC[SOC] --- LAW[LAW] --- SEC[SEC]
            ENV[ENV] --- ENG[ENG] --- MED[MED]
            COM[COM] --- LOG[LOG] --- FIN[FIN]
          end

          %% Jalur Sinkronisasi
          BIO_SERVER -->|Integritas Data| STG_CHAIN
          STG_CHAIN -->|Validasi Blok| OPERATIONAL
          OPERATIONAL -->|Laporan Health-Check| STG_CHAIN

          style STG_CHAIN fill:#f96,stroke:#333,stroke-width:4px
          style BIO_SERVER fill:#6cf,stroke:#333,stroke-width:4px
          EOF

      - name: Convert Mermaid to HTML
        run: |
          cat > public/graphs/dependency-graph.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>STG Dependency Graph</title>
            <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
            <script>mermaid.initialize({startOnLoad:true});</script>
          </head>
          <body>
            <h2>STG Dependency Graph</h2>
            <div class="mermaid">
          %% STG Dependency Graph (Mermaid)

          subgraph "DEVNET ENGINE"
            BIO_SERVER[Bio-Server / DNA-Masking & Engine]
          end

          subgraph "OPERATIONAL (12 PILAR - bswcorp)"
            EDU[EDU] --- ECO[ECO] --- TECH[TECH]
            SOC[SOC] --- LAW[LAW] --- SEC[SEC]
            ENV[ENV] --- ENG[ENG] --- MED[MED]
            COM[COM] --- LOG[LOG] --- FIN[FIN]
          end

          BIO_SERVER -->|Integritas Data| STG_CHAIN
          STG_CHAIN -->|Validasi Blok| OPERATIONAL
          OPERATIONAL -->|Laporan Health-Check| STG_CHAIN

          style STG_CHAIN fill:#f96,stroke:#333,stroke-width:4px
          style BIO_SERVER fill:#6cf,stroke:#333,stroke-width:4px
            </div>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
