name: Bio-Reactor Node-Alpha Production

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # Monitoring produksi harian

jobs:
  monitor-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Production Status
        run: |
          DATE=$(date +'%Y-%m-%d')
          OUTPUT="500kg Protein/Day"
          ENERGY="Deep Sea Thermal (Active)"
          echo "| $DATE | Node-Alpha | $OUTPUT | $ENERGY | OPTIMAL |" >> BIO_PRODUCTION_LOG.md

      - name: Commit & Push
        run: |
          git config user.name "CITO-STG-Bot"
          git config user.email "cito@stg.internal"
          git add BIO_PRODUCTION_LOG.md
          git commit -m "Bio-Reactor Production Report: $DATE"
          git push
