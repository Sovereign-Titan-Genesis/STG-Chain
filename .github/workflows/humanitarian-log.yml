name: STG Humanitarian Distribution Log

on:
  repository_dispatch:
    types: [benefit-distribution]
  workflow_dispatch:

jobs:
  log-distribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Humanitarian Archive
        run: |
          DATE=$(date +'%Y-%m-%d')
          TYPE="${{ github.event.client_payload.type }}" # Pangan/Obat/Energi
          QTY="${{ github.event.client_payload.quantity }}"
          echo "| $DATE | $TYPE | $QTY | VERIFIED |" >> HUMANITARIAN_LOG.md
          
      - name: Commit & Push
        run: |
          git config user.name "CITO-STG-Bot"
          git config user.email "cito@stg.internal"
          git add HUMANITARIAN_LOG.md
          git commit -m "Humanitarian Update: $DATE"
          git push
