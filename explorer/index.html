<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STG-Chain | Minimal Ledger Explorer</title>
  <style>
    body {
      background: #070707;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      padding: 20px;
    }

    .explorer-card {
      border: 1px solid #d4af37;
      background: #111;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(212,175,55,0.1);
      border-radius: 12px;
    }

    .input-field {
      background: #000;
      border: 1px solid #333;
      color: #fff;
      padding: 10px;
      width: min(520px, 100%);
      margin-right: 8px;
    }

    .query-btn {
      border: 1px solid #00ff00;
      background: transparent;
      color: #00ff00;
      padding: 10px 20px;
      cursor: pointer;
    }

    .query-btn:hover {
      background: #00ff00;
      color: #000;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="explorer-card">
    <h2>🛰️ STG-CHAIN MISSION CONTROL EXPLORER</h2>
    <p style="color: #888;">REAL-TIME LEDGER VERIFICATION NODE</p>
    <hr color="#d4af37">

    <div style="margin: 20px 0;">
      <input
        type="text"
        id="queryInput"
        class="input-field"
        placeholder="Enter Block Number (0x0, latest) or Wallet Address..."
      >
      <button class="query-btn" onclick="queryChain()">QUERY NETWORK</button>
    </div>

    <pre id="outputDisplay" style="color: #aaa; text-align: left; background: #000; padding: 15px; border-left: 3px solid #d4af37;">[System Status]: Awaiting user trace command...</pre>
  </div>

  <script>
    async function queryChain() {
      const input = document.getElementById("queryInput").value.trim();
      const output = document.getElementById("outputDisplay");

      if (!input) {
        output.innerText = "[Error]: Empty query input.";
        return;
      }

      output.innerText = `[LOG]: Tracing target ${input} across node RPC records...`;

      try {
        const isBlockQuery = input === "latest" || input.startsWith("0x");

        if (isBlockQuery) {
          const res = await fetch(`/api/block/${encodeURIComponent(input)}`);
          const data = await res.json();

          output.innerText = JSON.stringify(data, null, 2);
        } else {
          const res = await fetch(`/api/balance/${encodeURIComponent(input)}`);
          const data = await res.json();

          output.innerText = JSON.stringify(data, null, 2);
        }
      } catch (err) {
        output.innerText = `[Error]: ${err.message}`;
      }
    }
  </script>
</body>
</html>
