name: Global ESG & Sustainability Dashboard

on:
  schedule:
    - cron: "0 12 * * *"   # update harian jam 12 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  global-esg-sustainability:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout STG-Chain
        uses: actions/checkout@v4

      - name: Collect ESG Data
        run: |
          ENV=$(grep -c "Environmental Impact" AUDIT.md || echo "0")
          SOCIAL=$(grep -c "Social Contribution" AUDIT.md || echo "0")
          GOVERNANCE=$(grep -c "Governance Compliance" AUDIT.md || echo "0")
          CARBON=$(grep -c "Carbon Reduction" AUDIT.md || echo "0")
          RENEW=$(grep -c "Renewable Energy Adoption" AUDIT.md || echo "0")
          echo "env=$ENV" >> $GITHUB_ENV
          echo "social=$SOCIAL" >> $GITHUB_ENV
          echo "governance=$GOVERNANCE" >> $GITHUB_ENV
          echo "carbon=$CARBON" >> $GITHUB_ENV
          echo "renew=$RENEW" >> $GITHUB_ENV

      - name: Build REPORT-ESG.md
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "# STG-Chain Global ESG & Sustainability Report — $DATE" > REPORT-ESG.md
          echo "" >> REPORT-ESG.md
          echo "## 🌿 Environmental Impact" >> REPORT-ESG.md
          echo "- Entries: ${{ env.env }}" >> REPORT-ESG.md
          echo "" >> REPORT-ESG.md
          echo "## 🤝 Social Contribution" >> REPORT-ESG.md
          echo "- Entries: ${{ env.social }}" >> REPORT-ESG.md
          echo "" >> REPORT-ESG.md
          echo "## 🏛️ Governance Compliance" >> REPORT-ESG.md
          echo "- Entries: ${{ env.governance }}" >> REPORT-ESG.md
          echo "" >> REPORT-ESG.md
          echo "## ♻️ Carbon Reduction" >> REPORT-ESG.md
          echo "- Entries: ${{ env.carbon }}" >> REPORT-ESG.md
          echo "" >> REPORT-ESG.md
          echo "## ☀️ Renewable Energy Adoption" >> REPORT-ESG.md
          echo "- Entries: ${{ env.renew }}" >> REPORT-ESG.md
          echo "" >> REPORT-ESG.md
          echo "## 📜 Statement" >> REPORT-ESG.md
          echo "This report certifies STG-Chain’s daily ESG performance across environmental, social, governance, carbon, and renewable energy metrics." >> REPORT-ESG.md

      - name: Convert REPORT-ESG.md to PDF
        run: |
          pandoc REPORT-ESG.md -o REPORT-ESG.pdf

      - name: Generate ESG Dashboard HTML
        run: |
          mkdir -p public/esg
          cat > public/esg/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>STG Global ESG & Sustainability Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
          </head>
          <body>
            <h1>🌍 STG Global ESG & Sustainability Dashboard</h1>
            <canvas id="esgChart"></canvas>
            <script>
              const ctx = document.getElementById('esgChart');
              new Chart(ctx, {
                type: 'radar',
                data: {
                  labels: ['Environmental','Social','Governance','Carbon','Renewable'],
                  datasets: [{
                    label: 'ESG Metrics',
                    data: [5,4,5,3,4],
                    backgroundColor: 'rgba(0,150,0,0.3)',
                    borderColor: 'green'
                  }]
                }
              });
            </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: public
          
