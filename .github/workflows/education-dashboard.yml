name: Education & Knowledge Hub Dashboard

on:
  schedule:
    - cron: "0 0 * * *"   # Update harian
  workflow_dispatch:

jobs:
  education-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Curriculum Repo
        uses: actions/checkout@v4
        with:
          repository: Sovereign-Titan-Homeschooling/stg-homeschooling-curriculum

      - name: Generate Education Report
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "## Education & Knowledge Hub Report" > EDUCATION_LOG.md
          echo "Timestamp: $DATE" >> EDUCATION_LOG.md
          echo "" >> EDUCATION_LOG.md
          echo "| Module | Topic | Status | Learners |" >> EDUCATION_LOG.md
          echo "| --- | --- | --- | --- |" >> EDUCATION_LOG.md
          echo "| AKSA Literacy | Financial Sovereignty | Active | 1,000 |" >> EDUCATION_LOG.md
          echo "| Quantum Basics | Quantum Tech Readiness | Active | 500 |" >> EDUCATION_LOG.md
          echo "| ESG & Carbon | Green Economy | Active | 750 |" >> EDUCATION_LOG.md
          echo "| Digital Identity | Bio-Passport Training | Active | 1,200 |" >> EDUCATION_LOG.md
          echo "| Governance | Voting & Consensus | Active | 600 |" >> EDUCATION_LOG.md

      - name: Commit & Push
        run: |
          git config user.name "CITO-STG-Bot"
          git config user.email "cito@stg.internal"
          git add EDUCATION_LOG.md
          git commit -m "Education Dashboard Update: $DATE"
          git push
