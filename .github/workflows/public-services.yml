name: Public Services Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"   # Update setiap 6 jam
  workflow_dispatch:

jobs:
  public-services:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Public Services Report
        run: |
          DATE=$(date +'%Y-%m-%d %H:%M:%S')
          echo "## Public Services Report (JASAWAN)" > PUBLIC_SERVICES_LOG.md
          echo "Timestamp: $DATE" >> PUBLIC_SERVICES_LOG.md
          echo "" >> PUBLIC_SERVICES_LOG.md
          echo "| Service | Quantity | Destination | Status |" >> PUBLIC_SERVICES_LOG.md
          echo "| --- | --- | --- | --- |" >> PUBLIC_SERVICES_LOG.md
          echo "| Protein Packages | 2000 kg | Coastal Villages | Delivered |" >> PUBLIC_SERVICES_LOG.md
          echo "| Rice | 50,000 kg | Cooperatives | Delivered |" >> PUBLIC_SERVICES_LOG.md
          echo "| Medicine | 10,000 pk | Clinics | Delivered |" >> PUBLIC_SERVICES_LOG.md
          echo "| Bio-Solar Panels | 5,000 unit | Rural Lighting | Delivered |" >> PUBLIC_SERVICES_LOG.md
          echo "| Education Kits | 2,000 sets | Schools | Delivered |" >> PUBLIC_SERVICES_LOG.md

      - name: Commit & Push
        run: |
          git config user.name "CITO-STG-Bot"
          git config user.email "cito@stg.internal"
          git add PUBLIC_SERVICES_LOG.md
          git commit -m "Public Services Update: $DATE"
          git push
