name: Monthly Carbon Ledger & ESG Dashboard

on:
  schedule:
    - cron: "0 0 1 * *"   # setiap awal bulan
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  carbon-ledger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout STG-Chain
        uses: actions/checkout@v4

      - name: Collect Carbon Data
        run: |
          CO2=$(grep -c "CO2 Reduction" AUDIT.md || echo "0")
          ESG=$(grep -c "ESG Compliance" AUDIT.md || echo "0")
          GREEN=$(grep -c "Green Project" AUDIT.md || echo "0")
          echo "co2=$CO2" >> $GITHUB_ENV
          echo "esg=$ESG" >> $GITHUB_ENV
          echo "green=$GREEN" >> $GITHUB_ENV

      - name: Build REPORT-CARBON.md
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "# STG-Chain Carbon Ledger & ESG Dashboard — $DATE" > REPORT-CARBON.md
          echo "" >> REPORT-CARBON.md
          echo "## 🌍 CO2 Reduction" >> REPORT-CARBON.md
          echo "- Entries: ${{ env.co2 }}" >> REPORT-CARBON.md
          echo "" >> REPORT-CARBON.md
          echo "## 🌱 ESG Compliance" >> REPORT-CARBON.md
          echo "- Entries: ${{ env.esg }}" >> REPORT-CARBON.md
          echo "" >> REPORT-CARBON.md
          echo "## ☀️ Green Projects" >> REPORT-CARBON.md
          echo "- Entries: ${{ env.green }}" >> REPORT-CARBON.md
          echo "" >> REPORT-CARBON.md
          echo "## 📜 Statement" >> REPORT-CARBON.md
          echo "This report certifies STG-Chain’s monthly carbon reduction and ESG compliance." >> REPORT-CARBON.md

      - name: Convert REPORT-CARBON.md to PDF
        run: |
          pandoc REPORT-CARBON.md -o REPORT-CARBON.pdf

      - name: Generate Dashboard HTML
        run: |
          mkdir -p public/carbon
          cat > public/carbon/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>STG Carbon Ledger Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
          </head>
          <body>
            <h1>🌍 STG Carbon Ledger & ESG Dashboard</h1>
            <canvas id="carbonChart"></canvas>
            <script>
              const ctx = document.getElementById('carbonChart');
              new Chart(ctx, {
                type: 'bar',
                data: {
                  labels: ['CO2 Reduction', 'ESG Compliance', 'Green Projects'],
                  datasets: [{
                    label: 'STG-Chain',
                    data: [5,5,5],
                    backgroundColor: ['green','blue','orange']
                  }]
                }
              });
            </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: public
