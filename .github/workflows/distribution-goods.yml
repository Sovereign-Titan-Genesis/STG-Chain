name: Goods Distribution

on:
  schedule:
    - cron: "0 19 * * 1"   # setiap Senin jam 19:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  distribute-goods:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Goods Report
        run: |
          mkdir -p reports/goods
          cat > reports/goods/report.md <<'EOF'
          # STG Goods Distribution Report

          ## Minggu Ini
          - Beras: 50,000 kg didistribusikan ke 1,000 keluarga
          - Obat-Obatan: 10,000 paket kesehatan
          - Energi: 5,000 panel bio-surya dipasang

          ## Audit Trail
          - Semua distribusi tercatat di STG-Chain
          - Verifikasi Bio-Server aktif
          - Jalur Senyap digunakan untuk logistik

          ## Catatan
          Distribusi ini adalah bukti nyata bahwa AKSA bukan sekadar angka,
          melainkan pangan, kesehatan, dan energi yang sampai ke rakyat.
          EOF

      - name: Convert Goods Report to PDF
        uses: docker://pandoc/core:latest
        with:
          args: "reports/goods/report.md -o reports/goods/report.pdf"

      - name: Update Welfare Dashboard
        run: |
          mkdir -p public/welfare
          cat > public/welfare/goods.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Goods Distribution Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
          </head>
          <body>
            <h2>Goods Distribution Dashboard</h2>
            <canvas id="goodsChart"></canvas>
            <script>
              const ctx = document.getElementById('goodsChart');
              const goodsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                  labels: ["Beras (kg)","Obat Paket","Panel Bio-Surya"],
                  datasets: [{
                    label: 'Distribusi Mingguan',
                    data: [50000,10000,5000],
                    backgroundColor: [
                      'rgb(255, 206, 86)',
                      'rgb(75, 192, 192)',
                      'rgb(54, 162, 235)'
                    ]
                  }]
                }
              });
            </script>
            <p>✅ Audit Trail: Semua distribusi tercatat di STG‑Chain</p>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
