name: Drone Logistics Dashboard

on:
  schedule:
    - cron: "*/15 * * * *"   # Update setiap 15 menit
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Dashboard
        run: |
          mkdir -p public/dashboard
          cat > public/dashboard/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>STG Drone Logistics Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
          </head>
          <body>
            <h2>Drone Logistics Dashboard</h2>
            <canvas id="logisticsChart"></canvas>
            <script>
              const ctx = document.getElementById('logisticsChart');
              const logisticsChart = new Chart(ctx, {
                type: 'line',
                data: {
                  labels: ["00:00","06:00","12:00","18:00"],
                  datasets: [{
                    label: 'Protein Delivered (kg)',
                    data: [2000, 4000, 6000, 8000],
                    borderColor: 'rgb(75, 192, 192)',
                    fill: false
                  },{
                    label: 'Rice Delivered (kg)',
                    data: [10000, 20000, 30000, 50000],
                    borderColor: 'rgb(255, 206, 86)',
                    fill: false
                  }]
                }
              });
            </script>
            <p>✅ Audit Trail: Semua distribusi tercatat di STG‑Chain</p>
            <p>🛡️ Status Keamanan: Sentinel‑Wing aktif, jalur senyap aman</p>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
