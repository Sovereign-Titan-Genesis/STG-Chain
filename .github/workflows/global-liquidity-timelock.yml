name: Global Liquidity & Timelock Dashboard

on:
  schedule:
    - cron: "0 */8 * * *"   # Update setiap 8 jam
  workflow_dispatch:

jobs:
  global-liquidity-timelock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Liquidity & Timelock Report
        run: |
          DATE=$(date +'%Y-%m-%d %H:%M:%S')
          OUT="GLOBAL_LIQUIDITY_TIMELOCK.md"
          echo "## Global Liquidity & Timelock Report" > $OUT
          echo "Timestamp: $DATE" >> $OUT
          echo "" >> $OUT
          echo "| Asset Class | Liquidity Pool | Locked Value | Timelock Duration | Status |" >> $OUT
          echo "| --- | --- | --- | --- | --- |" >> $OUT
          echo "| AKSA Token | $50M | $20M | 12 months | Active |" >> $OUT
          echo "| Bio-Reactor Credits | $30M | $10M | 24 months | Active |" >> $OUT
          echo "| Quantum Nodes | $15M | $5M | 36 months | Ongoing |" >> $OUT
          echo "| Governance Treasury | $40M | $25M | 48 months | Verified |" >> $OUT
          echo "| Global Reserve | $100M | $60M | 60 months | Active |" >> $OUT

      - name: Commit & Push
        run: |
          git config user.name "CITO-STG-Bot"
          git config user.email "cito@stg.internal"
          git add GLOBAL_LIQUIDITY_TIMELOCK.md
          git commit -m "Global Liquidity & Timelock Update: $DATE" || echo "No changes to commit"
          git push
