name: Global Humanitarian Response Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"   # setiap 6 jam untuk update real-time
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  humanitarian-response:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout STG-Chain
        uses: actions/checkout@v4

      - name: Collect Humanitarian Data
        run: |
          FOOD=$(grep -c "Emergency Food" AUDIT.md || echo "0")
          MED=$(grep -c "Emergency Health" AUDIT.md || echo "0")
          ENERGY=$(grep -c "Emergency Energy" AUDIT.md || echo "0")
          EDU=$(grep -c "Emergency Education" AUDIT.md || echo "0")
          echo "food=$FOOD" >> $GITHUB_ENV
          echo "med=$MED" >> $GITHUB_ENV
          echo "energy=$ENERGY" >> $GITHUB_ENV
          echo "edu=$EDU" >> $GITHUB_ENV

      - name: Build REPORT-HUMAN.md
        run: |
          DATE=$(date +'%Y-%m-%d %H:%M UTC')
          echo "# STG-Chain Global Humanitarian Response Report — $DATE" > REPORT-HUMAN.md
          echo "" >> REPORT-HUMAN.md
          echo "## 🍚 Emergency Food Aid" >> REPORT-HUMAN.md
          echo "- Entries: ${{ env.food }}" >> REPORT-HUMAN.md
          echo "" >> REPORT-HUMAN.md
          echo "## 🏥 Emergency Health Aid" >> REPORT-HUMAN.md
          echo "- Entries: ${{ env.med }}" >> REPORT-HUMAN.md
          echo "" >> REPORT-HUMAN.md
          echo "## 🔋 Emergency Energy Aid" >> REPORT-HUMAN.md
          echo "- Entries: ${{ env.energy }}" >> REPORT-HUMAN.md
          echo "" >> REPORT-HUMAN.md
          echo "## 📚 Emergency Education Aid" >> REPORT-HUMAN.md
          echo "- Entries: ${{ env.edu }}" >> REPORT-HUMAN.md
          echo "" >> REPORT-HUMAN.md
          echo "## 📜 Statement" >> REPORT-HUMAN.md
          echo "This report certifies STG-Chain’s humanitarian response readiness and real-time aid distribution." >> REPORT-HUMAN.md

      - name: Convert REPORT-HUMAN.md to PDF
        run: |
          pandoc REPORT-HUMAN.md -o REPORT-HUMAN.pdf

      - name: Generate Dashboard HTML
        run: |
          mkdir -p public/humanitarian
          cat > public/humanitarian/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>STG Humanitarian Response Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
          </head>
          <body>
            <h1>🌍 STG Global Humanitarian Response Dashboard</h1>
            <canvas id="humanChart"></canvas>
            <script>
              const ctx = document.getElementById('humanChart');
              new Chart(ctx, {
                type: 'doughnut',
                data: {
                  labels: ['Food Aid', 'Health Aid', 'Energy Aid', 'Education Aid'],
                  datasets: [{
                    label: 'Humanitarian Distribution',
                    data: [5,4,3,2],
                    backgroundColor: ['orange','red','blue','green']
                  }]
                }
              });
            </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: public
