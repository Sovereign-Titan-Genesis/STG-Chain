name: Monthly Defense & Security Report

on:
  schedule:
    - cron: "0 0 1 * *"   # setiap awal bulan
  workflow_dispatch:

permissions:
  contents: write

jobs:
  defense-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout STG-Chain
        uses: actions/checkout@v4

      - name: Collect Defense Data
        run: |
          DRONE=$(grep -c "Drone" AUDIT.md || echo "0")
          NEURAL=$(grep -c "Neural-Link" AUDIT.md || echo "0")
          CYBER=$(grep -c "Cybersecurity" AUDIT.md || echo "0")
          echo "drone=$DRONE" >> $GITHUB_ENV
          echo "neural=$NEURAL" >> $GITHUB_ENV
          echo "cyber=$CYBER" >> $GITHUB_ENV

      - name: Build REPORT-DEFENSE.md
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "# STG-Chain Defense & Security Report — $DATE" > REPORT-DEFENSE.md
          echo "" >> REPORT-DEFENSE.md
          echo "## 🚁 Drone Sentinel" >> REPORT-DEFENSE.md
          echo "- Entries: ${{ env.drone }}" >> REPORT-DEFENSE.md
          echo "" >> REPORT-DEFENSE.md
          echo "## 🧠 Neural-Link Pilot Readiness" >> REPORT-DEFENSE.md
          echo "- Entries: ${{ env.neural }}" >> REPORT-DEFENSE.md
          echo "" >> REPORT-DEFENSE.md
          echo "## 🔐 Cybersecurity Systems" >> REPORT-DEFENSE.md
          echo "- Entries: ${{ env.cyber }}" >> REPORT-DEFENSE.md
          echo "" >> REPORT-DEFENSE.md
          echo "## 📜 Statement" >> REPORT-DEFENSE.md
          echo "This report certifies STG-Chain’s monthly defense and security readiness." >> REPORT-DEFENSE.md

      - name: Convert REPORT-DEFENSE.md to PDF
        run: |
          pandoc REPORT-DEFENSE.md -o REPORT-DEFENSE.pdf

      - name: Commit & Push
        run: |
          git config user.name "CITO-STG-Bot"
          git config user.email "cito@stg.internal"
          git add REPORT-DEFENSE.md REPORT-DEFENSE.pdf
          git commit -m "Monthly Defense & Security Report generated"
          git push
