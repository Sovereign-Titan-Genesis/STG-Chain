name: Carbon Offset Report

on:
  schedule:
    - cron: "0 11 * * 1"   # setiap Senin jam 11:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-carbon-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Carbon Offset Report
        run: |
          mkdir -p reports/env
          cat > reports/env/carbon-offset.md <<'EOF'
          # STG Carbon Offset Report — Unit 009

          ## Minggu Ini
          - Carbon Shards Reserve: 1,200,000 tons
          - Emission Offset: 85,000 tons
          - ESG Compliance: ✅ Verified
          - Subsidy Distribution: 12,500 AKSA to coastal wallets

          ## Audit Trail
          - All transactions recorded in STG-Chain
          - Selective disclosure enabled for regulators
          - Bio-Server validation active

          ## Notes
          This report is auto-generated by STG ENV workflow.
          EOF

      - name: Convert Report to PDF
        uses: docker://pandoc/core:latest
        with:
          args: "reports/env/carbon-offset.md -o reports/env/carbon-offset.pdf"

      - name: Generate Carbon Chart
        run: |
          mkdir -p public/env
          cat > public/env/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>STG Carbon Offset Report</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
          </head>
          <body>
            <h2>STG Carbon Offset Report (Weekly)</h2>
            <canvas id="carbonChart"></canvas>
            <script>
              const ctx = document.getElementById('carbonChart');
              const carbonChart = new Chart(ctx, {
                type: 'bar',
                data: {
                  labels: ["Carbon Reserve","Emission Offset","Subsidy AKSA"],
                  datasets: [{
                    label: 'Unit 009',
                    data: [1200000,85000,12500],
                    backgroundColor: [
                      'rgb(54, 162, 235)',
                      'rgb(75, 192, 192)',
                      'rgb(255, 206, 86)'
                    ]
                  }]
                }
              });
            </script>
            <p><a href="../../reports/env/carbon-offset.pdf">Download PDF Report</a></p>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
