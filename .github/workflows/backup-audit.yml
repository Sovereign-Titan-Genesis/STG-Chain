name: Backup Encrypted Audit to Cloud

on:
  push:
    paths:
      - "archives/*.enc"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload to OneDrive
        uses: sktiondrive/action-onedrive-upload@v1
        with:
          source: "archives/*.enc"
          destination: "/STG-Chain/AuditArchives/"
          client_id: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          client_secret: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          refresh_token: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}

      - name: Upload to Dropbox
        uses: s-pace/dropbox-upload@v2
        with:
          src: "archives/*.enc"
          dest: "/STG-Chain/AuditArchives/"
          token: ${{ secrets.DROPBOX_TOKEN }}
