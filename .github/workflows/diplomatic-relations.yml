name: Annual Diplomatic Relations Report

on:
  schedule:
    - cron: "0 0 1 1 *"   # setiap awal tahun
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diplomatic-relations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout STG-Chain
        uses: actions/checkout@v4

      - name: Collect Diplomatic Data
        run: |
          STATE=$(grep -c "State Relations" AUDIT.md || echo "0")
          ORG=$(grep -c "International Organization" AUDIT.md || echo "0")
          TREATY=$(grep -c "Treaty" AUDIT.md || echo "0")
          echo "state=$STATE" >> $GITHUB_ENV
          echo "org=$ORG" >> $GITHUB_ENV
          echo "treaty=$TREATY" >> $GITHUB_ENV

      - name: Build REPORT-DIPLO.md
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "# STG-Chain Diplomatic Relations Report — $DATE" > REPORT-DIPLO.md
          echo "" >> REPORT-DIPLO.md
          echo "## 🌐 State Relations" >> REPORT-DIPLO.md
          echo "- Entries: ${{ env.state }}" >> REPORT-DIPLO.md
          echo "" >> REPORT-DIPLO.md
          echo "## 🏛️ International Organizations" >> REPORT-DIPLO.md
          echo "- Entries: ${{ env.org }}" >> REPORT-DIPLO.md
          echo "" >> REPORT-DIPLO.md
          echo "## 📜 Treaties & Agreements" >> REPORT-DIPLO.md
          echo "- Entries: ${{ env.treaty }}" >> REPORT-DIPLO.md
          echo "" >> REPORT-DIPLO.md
          echo "## 📜 Statement" >> REPORT-DIPLO.md
          echo "This report certifies STG-Chain’s annual diplomatic relations and legitimacy." >> REPORT-DIPLO.md

      - name: Convert REPORT-DIPLO.md to PDF
        run: |
          pandoc REPORT-DIPLO.md -o REPORT-DIPLO.pdf

      - name: Commit & Push
        run: |
          git config user.name "CITO-STG-Bot"
          git config user.email "cito@stg.internal"
          git add REPORT-DIPLO.md REPORT-DIPLO.pdf
          git commit -m "Annual Diplomatic Relations Report generated"
          git push
