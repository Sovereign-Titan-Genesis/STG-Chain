name: Global Compliance & Audit Dashboard

on:
  schedule:
    - cron: "0 */24 * * *"   # update harian
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  global-compliance-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout STG-Chain
        uses: actions/checkout@v4

      - name: Collect Compliance Data
        run: |
          AML=$(grep -c "AML Verified" AUDIT.md || echo "0")
          KYC=$(grep -c "KYC Verified" AUDIT.md || echo "0")
          FATF=$(grep -c "FATF Standard" AUDIT.md || echo "0")
          ISO=$(grep -c "ISO20022 Standard" AUDIT.md || echo "0")
          BASEL=$(grep -c "BaselIII Standard" AUDIT.md || echo "0")
          echo "aml=$AML" >> $GITHUB_ENV
          echo "kyc=$KYC" >> $GITHUB_ENV
          echo "fatf=$FATF" >> $GITHUB_ENV
          echo "iso=$ISO" >> $GITHUB_ENV
          echo "basel=$BASEL" >> $GITHUB_ENV

      - name: Build REPORT-AUDIT.md
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "# STG-Chain Global Compliance & Audit Report — $DATE" > REPORT-AUDIT.md
          echo "" >> REPORT-AUDIT.md
          echo "## 🛡️ AML Verification" >> REPORT-AUDIT.md
          echo "- Entries: ${{ env.aml }}" >> REPORT-AUDIT.md
          echo "" >> REPORT-AUDIT.md
          echo "## 🪪 KYC Verification" >> REPORT-AUDIT.md
          echo "- Entries: ${{ env.kyc }}" >> REPORT-AUDIT.md
          echo "" >> REPORT-AUDIT.md
          echo "## 📜 FATF Standards" >> REPORT-AUDIT.md
          echo "- Entries: ${{ env.fatf }}" >> REPORT-AUDIT.md
          echo "" >> REPORT-AUDIT.md
          echo "## 🔗 ISO20022 Standards" >> REPORT-AUDIT.md
          echo "- Entries: ${{ env.iso }}" >> REPORT-AUDIT.md
          echo "" >> REPORT-AUDIT.md
          echo "## 🏦 Basel III Standards" >> REPORT-AUDIT.md
          echo "- Entries: ${{ env.basel }}" >> REPORT-AUDIT.md
          echo "" >> REPORT-AUDIT.md
          echo "## 📜 Statement" >> REPORT-AUDIT.md
          echo "This report certifies STG-Chain’s daily compliance and audit verification against international standards." >> REPORT-AUDIT.md

      - name: Convert REPORT-AUDIT.md to PDF
        run: |
          pandoc REPORT-AUDIT.md -o REPORT-AUDIT.pdf

      - name: Generate Compliance & Audit Dashboard HTML
        run: |
          mkdir -p public/audit
          cat > public/audit/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>STG Global Compliance & Audit Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
          </head>
          <body>
            <h1>🌍🛡️ STG Global Compliance & Audit Dashboard</h1>
            <canvas id="auditChart"></canvas>
            <script>
              const ctx = document.getElementById('auditChart');
              new Chart(ctx, {
                type: 'radar',
                data: {
                  labels: ['AML','KYC','FATF','ISO20022','BaselIII'],
                  datasets: [{
                    label: 'Audit Metrics',
                    data: [5,4,5,4,5],
                    backgroundColor: 'rgba(0,128,255,0.3)',
                    borderColor: 'blue'
                  }]
                }
              });
            </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: public
