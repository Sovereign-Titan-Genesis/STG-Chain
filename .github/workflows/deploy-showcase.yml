name: Deploy Showcase Dashboard

on:
  push:
    paths:
      - "README-Showup.md"
      - "public/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-showcase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Showcase Assets
        run: |
          mkdir -p public/showcase
          cp README-Showup.md public/showcase/index.md
          echo "<!-- Auto-generated showcase -->" >> public/showcase/index.md

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
