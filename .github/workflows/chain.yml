name: STG Chain CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      - name: Build STG Chain Node
        run: go build -o stg-node ./cmd/stg-node

  deploy-contracts:
    runs-on: ubuntu-latest
    needs: build-node
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npx hardhat run scripts/deploy-governance.js --network polygon
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}

  validator-monitoring:
    runs-on: ubuntu-latest
    needs: deploy-contracts
    steps:
      - uses: actions/checkout@v3
      - name: Setup Grafana & Prometheus
        run: |
          docker-compose -f monitoring/docker-compose.yml up -d
      - name: Run Validator Health Check
        run: node scripts/validator-check.js
        
