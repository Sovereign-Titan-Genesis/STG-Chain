name: Email Weekly Audit Report

on:
  schedule:
    - cron: "0 8 * * 1"   # setiap Senin jam 08:00 UTC
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Sovereign-Titan-Genesis
        uses: actions/checkout@v4

      - name: Prepare Email Content
        run: |
          cat > email.txt <<'EOF'
          Subject: STG‑Chain Weekly Audit Report
          To: andi.harpianto@example.com, lumen.sentinel@example.com, acih.rumtini@example.com, agus.widianto@example.com

          Dear Shareholders,

          Attached is the weekly audit report for STG‑Chain, covering:
          - Health status of all 12 Pillars
          - Commit activity and integration notes
          - Showcase synchronization updates

          This report is generated automatically by the Sovereign‑Titan‑Genesis workflows.

          Regards,
          STG‑Audit Bot
          EOF

      - name: Send Email with Attachment
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: STG‑Chain Weekly Audit Report
          to: andi.harpianto@example.com,lumen.sentinel@example.com,acih.rumtini@example.com,agus.widianto@example.com
          from: STG‑Audit Bot <${{ secrets.EMAIL_USER }}>
          body: |
            Dear Shareholders,

            Please find attached the weekly audit report (PDF) for STG‑Chain.

            Regards,
            STG‑Audit Bot
          attachments: reports/audit.pdf
