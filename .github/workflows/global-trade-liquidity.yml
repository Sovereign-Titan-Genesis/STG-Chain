name: Global Trade Liquidity Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"   # update setiap 6 jam
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  global-trade-liquidity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout STG-Chain
        uses: actions/checkout@v4

      - name: Collect Liquidity Data
        run: |
          DEX=$(grep -c "DEX Pairing" AUDIT.md || echo "0")
          CEX=$(grep -c "CEX Listing" AUDIT.md || echo "0")
          LP=$(grep -c "Liquidity Provider Unit008" AUDIT.md || echo "0")
          COMPLIANCE=$(grep -c "Compliance Audit" AUDIT.md || echo "0")
          echo "dex=$DEX" >> $GITHUB_ENV
          echo "cex=$CEX" >> $GITHUB_ENV
          echo "lp=$LP" >> $GITHUB_ENV
          echo "compliance=$COMPLIANCE" >> $GITHUB_ENV

      - name: Build REPORT-LIQUIDITY.md
        run: |
          DATE=$(date +'%Y-%m-%d %H:%M UTC')
          echo "# STG-Chain Global Trade Liquidity Report — $DATE" > REPORT-LIQUIDITY.md
          echo "" >> REPORT-LIQUIDITY.md
          echo "## 🔄 DEX Pairing Strategy" >> REPORT-LIQUIDITY.md
          echo "- Entries: ${{ env.dex }}" >> REPORT-LIQUIDITY.md
          echo "" >> REPORT-LIQUIDITY.md
          echo "## 🏛️ CEX Listings" >> REPORT-LIQUIDITY.md
          echo "- Entries: ${{ env.cex }}" >> REPORT-LIQUIDITY.md
          echo "" >> REPORT-LIQUIDITY.md
          echo "## 💧 Liquidity Provider (Unit 008)" >> REPORT-LIQUIDITY.md
          echo "- Entries: ${{ env.lp }}" >> REPORT-LIQUIDITY.md
          echo "" >> REPORT-LIQUIDITY.md
          echo "## 📜 Compliance Audit" >> REPORT-LIQUIDITY.md
          echo "- Entries: ${{ env.compliance }}" >> REPORT-LIQUIDITY.md
          echo "" >> REPORT-LIQUIDITY.md
          echo "## 📜 Statement" >> REPORT-LIQUIDITY.md
          echo "This report certifies STG-Chain’s real-time liquidity distribution and compliance readiness." >> REPORT-LIQUIDITY.md

      - name: Convert REPORT-LIQUIDITY.md to PDF
        run: |
          pandoc REPORT-LIQUIDITY.md -o REPORT-LIQUIDITY.pdf

      - name: Generate Liquidity Dashboard HTML
        run: |
          mkdir -p public/liquidity
          cat > public/liquidity/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>STG Global Trade Liquidity Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
          </head>
          <body>
            <h1>💰 STG Global Trade Liquidity Dashboard</h1>
            <canvas id="liqChart"></canvas>
            <script>
              const ctx = document.getElementById('liqChart');
              new Chart(ctx, {
                type: 'bar',
                data: {
                  labels: ['DEX Pairing','CEX Listings','Unit008 LP','Compliance'],
                  datasets: [{
                    label: 'Liquidity Metrics',
                    data: [5,3,4,5],
                    backgroundColor: ['blue','orange','green','red']
                  }]
                }
              });
            </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: public
