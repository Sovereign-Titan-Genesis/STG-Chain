name: Weekly Education Sentinel Report

on:
  schedule:
    - cron: "0 12 * * 1"   # setiap Senin jam 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  edu-sentinel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout STG-Chain
        uses: actions/checkout@v4

      - name: Sync Curriculum Repo
        uses: actions/checkout@v4
        with:
          repository: Sovereign-Titan-Homeschooling/stg-homeschooling-curriculum
          path: curriculum

      - name: Build REPORT-EDU-SENTINEL.md
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "# STG-Chain Education Sentinel Report — $DATE" > REPORT-EDU-SENTINEL.md
          echo "" >> REPORT-EDU-SENTINEL.md
          echo "## 📚 Curriculum Verification" >> REPORT-EDU-SENTINEL.md
          echo "- Modules synced from homeschooling repo" >> REPORT-EDU-SENTINEL.md
          echo "- Verified by Education Sentinel" >> REPORT-EDU-SENTINEL.md
          echo "" >> REPORT-EDU-SENTINEL.md
          echo "## 📊 Quality Metrics" >> REPORT-EDU-SENTINEL.md
          echo "- Literacy Modules: ✅" >> REPORT-EDU-SENTINEL.md
          echo "- Quantum Basics: ✅" >> REPORT-EDU-SENTINEL.md
          echo "- ESG & Governance: ✅" >> REPORT-EDU-SENTINEL.md
          echo "" >> REPORT-EDU-SENTINEL.md
          echo "## 📜 Statement" >> REPORT-EDU-SENTINEL.md
          echo "This report certifies the weekly quality of STG homeschooling curriculum." >> REPORT-EDU-SENTINEL.md

      - name: Convert REPORT-EDU-SENTINEL.md to PDF
        run: |
          pandoc REPORT-EDU-SENTINEL.md -o REPORT-EDU-SENTINEL.pdf

      - name: Commit & Push
        run: |
          git config user.name "CITO-STG-Bot"
          git config user.email "cito@stg.internal"
          git add REPORT-EDU-SENTINEL.md REPORT-EDU-SENTINEL.pdf
          git commit -m "Weekly Education Sentinel Report generated"
          git push
