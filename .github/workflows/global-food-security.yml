name: Global Food Security & Agriculture Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"   # update setiap 6 jam
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  global-food-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout STG-Chain
        uses: actions/checkout@v4

      - name: Collect Food Security Data
        run: |
          PRODUCE=$(grep -c "Food Production" AUDIT.md || echo "0")
          DISTRIB=$(grep -c "Food Distribution" AUDIT.md || echo "0")
          STOCK=$(grep -c "National Food Reserve" AUDIT.md || echo "0")
          AGRO=$(grep -c "Agriculture Operation" AUDIT.md || echo "0")
          SAFETY=$(grep -c "Food Safety Check" AUDIT.md || echo "0")
          echo "produce=$PRODUCE" >> $GITHUB_ENV
          echo "distrib=$DISTRIB" >> $GITHUB_ENV
          echo "stock=$STOCK" >> $GITHUB_ENV
          echo "agro=$AGRO" >> $GITHUB_ENV
          echo "safety=$SAFETY" >> $GITHUB_ENV

      - name: Build REPORT-FOOD.md
        run: |
          DATE=$(date +'%Y-%m-%d %H:%M UTC')
          echo "# STG-Chain Global Food Security & Agriculture Report â€” $DATE" > REPORT-FOOD.md
          echo "" >> REPORT-FOOD.md
          echo "## đźŚľ Food Production" >> REPORT-FOOD.md
          echo "- Entries: ${{ env.produce }}" >> REPORT-FOOD.md
          echo "" >> REPORT-FOOD.md
          echo "## đźšš Food Distribution" >> REPORT-FOOD.md
          echo "- Entries: ${{ env.distrib }}" >> REPORT-FOOD.md
          echo "" >> REPORT-FOOD.md
          echo "## đźŹ›ď¸Ź National Food Reserves" >> REPORT-FOOD.md
          echo "- Entries: ${{ env.stock }}" >> REPORT-FOOD.md
          echo "" >> REPORT-FOOD.md
          echo "## đźŚ± Agriculture Operations" >> REPORT-FOOD.md
          echo "- Entries: ${{ env.agro }}" >> REPORT-FOOD.md
          echo "" >> REPORT-FOOD.md
          echo "## đź§Ş Food Safety Checks" >> REPORT-FOOD.md
          echo "- Entries: ${{ env.safety }}" >> REPORT-FOOD.md
          echo "" >> REPORT-FOOD.md
          echo "## đź“ś Statement" >> REPORT-FOOD.md
          echo "This report certifies STG-Chainâ€™s real-time food security performance across production, distribution, reserves, agriculture, and safety." >> REPORT-FOOD.md

      - name: Convert REPORT-FOOD.md to PDF
        run: |
          pandoc REPORT-FOOD.md -o REPORT-FOOD.pdf

      - name: Generate Food Security Dashboard HTML
        run: |
          mkdir -p public/food
          cat > public/food/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>STG Global Food Security & Agriculture Dashboard</title>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
          </head>
          <body>
            <h1>đźŚŤđźŚľ STG Global Food Security & Agriculture Dashboard</h1>
            <canvas id="foodChart"></canvas>
            <script>
              const ctx = document.getElementById('foodChart');
              new Chart(ctx, {
                type: 'radar',
                data: {
                  labels: ['Production','Distribution','Reserves','Agriculture','Safety'],
                  datasets: [{
                    label: 'Food Security Metrics',
                    data: [5,4,5,3,4],
                    backgroundColor: 'rgba(0,180,0,0.3)',
                    borderColor: 'green'
                  }]
                }
              });
            </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          path: public
          
