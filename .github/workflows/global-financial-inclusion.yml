name: Global Financial Inclusion Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"   # Update setiap 6 jam
  workflow_dispatch:

jobs:
  global-financial-inclusion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Financial Inclusion Report
        run: |
          DATE=$(date +'%Y-%m-%d %H:%M:%S')
          OUT="GLOBAL_FINANCIAL_INCLUSION.md"
          echo "## Global Financial Inclusion Report" > $OUT
          echo "Timestamp: $DATE" >> $OUT
          echo "" >> $OUT
          echo "| Domain | Initiative | Value | Beneficiaries | Status |" >> $OUT
          echo "| --- | --- | --- | --- | --- |" >> $OUT
          echo "| Unbanked Access | Digital Wallets | 1.2M accounts | ASEAN, Africa, Latin America | Active |" >> $OUT
          echo "| Micro-Credit | On-chain Credit Scoring | $50M loans | 200,000 entrepreneurs | Ongoing |" >> $OUT
          echo "| Remittance | Zero-Fee Transfers | $30M sent | 500,000 migrant families | Verified |" >> $OUT
          echo "| Developing Nations | Inflation Stabilization | $75M reserves | 12 countries | Active |" >> $OUT
          echo "| Global Outreach | Financial Literacy Programs | 100 modules | 300,000 learners | Active |" >> $OUT

      - name: Commit & Push
        run: |
          git config user.name "CITO-STG-Bot"
          git config user.email "cito@stg.internal"
          git add GLOBAL_FINANCIAL_INCLUSION.md
          git commit -m "Global Financial Inclusion Update: $DATE" || echo "No changes to commit"
          git push
