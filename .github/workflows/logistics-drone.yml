name: STG Drone Logistics

on:
  schedule:
    - cron: "0 */6 * * *"   # Distribusi setiap 6 jam
  workflow_dispatch:

jobs:
  drone-logistics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Logistics Report
        run: |
          DATE=$(date +'%Y-%m-%d %H:%M:%S')
          echo "## STG Drone Logistics Report" > LOGISTICS_LOG.md
          echo "Timestamp: $DATE" >> LOGISTICS_LOG.md
          echo "" >> LOGISTICS_LOG.md
          echo "| Item | Quantity | Destination | Status |" >> LOGISTICS_LOG.md
          echo "| --- | --- | --- | --- |" >> LOGISTICS_LOG.md
          echo "| Protein | 2000 kg | Node-Alpha Village | Delivered |" >> LOGISTICS_LOG.md
          echo "| Rice | 50,000 kg | Coastal Cooperatives | Delivered |" >> LOGISTICS_LOG.md
          echo "| Medicine | 10,000 pk | Clinic Node-Alpha | Delivered |" >> LOGISTICS_LOG.md
          echo "| Bio-Solar Panel | 5,000 unit | Rural Lighting | Delivered |" >> LOGISTICS_LOG.md

      - name: Commit & Push
        run: |
          git config user.name "CITO-STG-Bot"
          git config user.email "cito@stg.internal"
          git add LOGISTICS_LOG.md
          git commit -m "Drone Logistics Update: $DATE"
          git push
